server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA-Einstieg niemals cachen: ein gecachtes index.html referenziert nach
    # einem Deploy gelöschte Asset-Hashes (weiße Seite). Gleiches gilt für den
    # Service Worker, sonst bleibt eine alte SW-Version dauerhaft aktiv.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Referrer-Policy "no-referrer" always;
    }

    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}
