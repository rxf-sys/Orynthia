# ===================================================
# Orynthia - Docker Compose (Homeserver / Proxmox)
# ===================================================
# Nutzung:
#   docker compose up --build        (Entwicklung)
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d  (Produktion)

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: orynthia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orynthia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nicht gesetzt – bitte .env aus .env.example anlegen}
      POSTGRES_DB: ${POSTGRES_DB:-orynthia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orynthia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orynthia-net

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: orynthia-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD nicht gesetzt – bitte .env aus .env.example anlegen}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD nicht gesetzt – bitte .env aus .env.example anlegen}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orynthia-net

  # ---------- Backend (NestJS) ----------
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
      target: development
    container_name: orynthia-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orynthia}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nicht gesetzt – bitte .env aus .env.example anlegen}@postgres:5432/${POSTGRES_DB:-orynthia}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD nicht gesetzt – bitte .env aus .env.example anlegen}
      # Cookies über HTTP zulassen (false für Homeserver ohne HTTPS)
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Swagger UI aktivieren (nur für Entwicklung empfohlen)
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      # Demo-User mit Test-Daten beim Boot anlegen (zerstört alte Demo-Daten!)
      SEED_DEMO_USER: ${SEED_DEMO_USER:-false}
    volumes:
      - ./packages/backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orynthia-net

  # ---------- Frontend (React + Vite) ----------
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      target: development
    container_name: orynthia-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - orynthia-net

  # ---------- Prisma Studio (optional, profile "tools") ----------
  # Start mit: docker compose --profile tools up -d prisma-studio
  # Web-UI:    http://localhost:5555
  prisma-studio:
    image: node:20-alpine
    container_name: orynthia-prisma-studio
    profiles: ["tools"]
    working_dir: /work
    volumes:
      - ./packages/backend/prisma:/work/prisma:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orynthia}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nicht gesetzt – bitte .env aus .env.example anlegen}@postgres:5432/${POSTGRES_DB:-orynthia}?schema=public
    ports:
      - "5555:5555"
    command:
      - sh
      - -c
      - "npx -y prisma@5.22.0 studio --port 5555 --hostname 0.0.0.0 --browser none"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orynthia-net

  # ---------- NGINX (Reverse Proxy) ----------
  nginx:
    image: nginx:alpine
    container_name: orynthia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - orynthia-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  orynthia-net:
    driver: bridge
